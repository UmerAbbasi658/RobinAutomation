name: Run Robin Automation

on:
  workflow_dispatch:
    inputs:
      proposal_id:
        description: "Proposal ID"
        required: true
      page_id:
        description: "Page ID"
        required: true
      callback_url:
        description: "Zapier webhook URL"
        required: false

jobs:
  run-automation:
    runs-on: ubuntu-22.04
    # The image below is pre-built for Python and fixes the 'pip' error
    container: ://mcr.microsoft.com

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      # Move inputs directly to the job level to avoid shell export issues
      PROPOSAL_ID: ${{ github.event.inputs.proposal_id }}
      PAGE_ID: ${{ github.event.inputs.page_id }}
      CALLBACK_URL: ${{ github.event.inputs.callback_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          # Only installs chromium to save time/space
          python3 -m playwright install chromium --with-deps

      - name: Run Automation Script
        run: |
          python3 main.py
