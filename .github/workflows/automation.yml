name: Run Robin Automation

on:
  workflow_dispatch:
    inputs:
      proposal_id:
        description: "Proposal ID"
        required: true
      page_id:
        description: "Page ID"
        required: true
      callback_url:
        description: "Zapier webhook URL"
        required: true

jobs:
  run-automation:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:1.42.0-focal  # prebuilt container with Python, pip, Playwright

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python3 -m playwright install

      - name: Run Automation Script
        run: |
          export PROPOSAL_ID="${{ github.event.inputs.proposal_id }}"
          export PAGE_ID="${{ github.event.inputs.page_id }}"
          export CALLBACK_URL="${{ github.event.inputs.callback_url }}"
          python3 main.py