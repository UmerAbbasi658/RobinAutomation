name: Run Robin Automation

on:
  workflow_dispatch: # Manual trigger
  repository_dispatch: # Optional: external API trigger
    types: [zapier-trigger] 

jobs:
  run-automation:
    runs-on: ubuntu-latest
    environment: robin_automation  # GitHub environment with secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run automation script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROPOSAL_ID: ${{ github.event.inputs.proposal_id }}
          PAGE_ID: ${{ github.event.inputs.page_id }}
          CALLBACK_URL: ${{ github.event.inputs.callback_url }}
        run: python main.py