name: Run Robin Automation

on:
  workflow_dispatch:
    inputs:
      proposal_id:
        description: "Proposal ID"
        required: true
      page_id:
        description: "Page ID"
        required: true
      callback_url:
        description: "Zapier webhook URL"
        required: true

jobs:
  run-automation:
    runs-on: ubuntu-22.04
    # Switched to the python-specific playwright image
    container: ://mcr.microsoft.com

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          # The image has playwright, but you still need to fetch browser binaries
          python3 -m playwright install chromium --with-deps

      - name: Run Automation Script
        run: |
          python3 main.py
        env:
          PROPOSAL_ID: ${{ github.event.inputs.proposal_id }}
          PAGE_ID: ${{ github.event.inputs.page_id }}
          CALLBACK_URL: ${{ github.event.inputs.callback_url }}
