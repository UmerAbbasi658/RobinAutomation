name: Run Robin Automation

# Trigger manually in GitHub Actions
on:
  workflow_dispatch:
    inputs:
      proposal_id:
        description: "Proposal ID"
        required: true
      page_id:
        description: "Page ID"
        required: true
      callback_url:
        description: "Zapier webhook URL"
        required: true

jobs:
  run-automation:
    # Use prebuilt Playwright container with all dependencies
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.42.0-focal

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upgrade pip & install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python3 -m playwright install

      - name: Run Robin Automation
        run: |
          # Set inputs as environment variables for main.py
          export PROPOSAL_ID="${{ github.event.inputs.proposal_id }}"
          export PAGE_ID="${{ github.event.inputs.page_id }}"
          export CALLBACK_URL="${{ github.event.inputs.callback_url }}"

          python3 main.py